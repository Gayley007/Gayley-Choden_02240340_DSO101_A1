services:
  - type: web
    name: be-todo
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://fe-todo-02240340.onrender.com

  - type: web
    name: fe-todo
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://be-todo-02240340.onrender.com/api/tasks

databases:
  - name: todo-db
    plan: free
